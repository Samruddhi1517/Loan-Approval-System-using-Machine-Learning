<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page">

    <div class="header">
        <h1>Loan Approval Prediction System</h1>
    </div>

    <div class="form-card">
        <form action="/predict" method="POST">

            <div class="form-row">
                <div class="form-group">
                    <input type="number" name="age" min=21 required>
                    <label>Age</label>
                </div>

                <div class="form-group">
                    <select name="gender" required>
                        <option value="" disabled selected></option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <label>Gender</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <select name="marital_status" required>
                        <option value="" disabled selected></option>
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                    </select>
                    <label>Marital Status</label>
                </div>

                <div class="form-group">
                    <select name="employment_status" required>
                        <option value="" disabled selected></option>
                        <option value="Employed">Employed</option>
                        <option value="Self-employed">Self-employed</option>
                        <option value="Unemployed">Unemployed</option>
                    </select>
                    <label>Employment Status</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <input type="number" name="annual_income" required>
                    <label>Annual Income</label>
                </div>

                <div class="form-group">
                    <input type="number" name="loan_amount" required>
                    <label>Loan Amount</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <input type="number" name="credit_score" required>
                    <label>Credit Score (300–900)</label>
                </div>

                <div class="form-group">
                    <input type="number" name="num_dependents" required>
                    <label>Number of Dependents</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group full-width">
                    <input type="number" name="existing_loans_count" required>
                    <label>Existing Loans Count</label>
                </div>
            </div>

            <button type="submit" class="submit-btn">Check Eligibility</button>

        </form>
    </div>

</div>

</body>
</html>
